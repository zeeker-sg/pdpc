name: Sync Enforcement Decisions

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full rebuild (ignore existing data)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Docling PDF extraction can be slow for large batches

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install dependencies
      run: uv sync

    - name: Build database
      env:
        TAILSCALE_PROXY: ${{ secrets.TAILSCALE_PROXY }}
        DOCLING_SERVE_URL: ${{ secrets.DOCLING_SERVE_URL }}
        S3_BUCKET: ${{ secrets.S3_BUCKET }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      run: |
        # --setup-fts is idempotent as of zeeker 0.9.0, so every build (fresh or
        # incremental) rebuilds the FTS index before deploy.
        if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
          echo "Force rebuild — building from scratch"
          uv run zeeker build enforcement_decisions --setup-fts
        else
          echo "Incremental sync from S3"
          uv run zeeker build --sync-from-s3 enforcement_decisions --setup-fts
        fi

        if [ ! -f "pdpc.db" ]; then
          echo "Error: Database file not created"
          exit 1
        fi

        DB_SIZE=$(du -h pdpc.db | cut -f1)
        echo "Database updated successfully (${DB_SIZE})"

    - name: Deploy to S3
      env:
        S3_BUCKET: ${{ secrets.S3_BUCKET }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      run: |
        uv run zeeker deploy
        echo "Deployment completed"

    - name: Create backup archive
      env:
        S3_BUCKET: ${{ secrets.S3_BUCKET }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      run: uv run zeeker backup

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sync-${{ github.run_number }}
        path: |
          pdpc.db
          metadata.json
        retention-days: 7

    - name: Summary
      if: success()
      run: |
        echo "## Sync Successful" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY

        uv run python -c "
        import sqlite3, os
        conn = sqlite3.connect('pdpc.db')
        cursor = conn.cursor()
        cursor.execute('SELECT name FROM sqlite_master WHERE type=\"table\" AND name NOT LIKE \"sqlite_%\" AND name NOT LIKE \"_zeeker_%\"')
        for (table,) in cursor.fetchall():
            cursor.execute(f'SELECT COUNT(*) FROM {table}')
            count = cursor.fetchone()[0]
            print(f'- {table}: {count:,} records')
        size_mb = os.path.getsize('pdpc.db') / (1024*1024)
        print(f'- **Database size:** {size_mb:.1f} MB')
        " >> $GITHUB_STEP_SUMMARY
